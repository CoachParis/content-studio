<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paris Simone Content Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f6f1ee;
  --mauve: #9e6b65;
  --box: #ddcfc7;
  --dark: #1e1410;
  --mid: #5c3c38;
}
body { background: var(--bg); color: var(--dark); font-family: Montserrat, sans-serif; }
header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--box); background: white; }
.logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; }
.logo em { color: var(--mauve); font-style: italic; }
.tagline { font-size: 0.85rem; color: var(--mid); margin-top: 4px; font-style: italic; }
.api-bar { padding: 0.8rem 2rem; background: #f9f7f5; border-bottom: 1px solid var(--box); display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
.api-label { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; color: var(--mauve); letter-spacing: 0.12em; white-space: nowrap; }
.api-input { flex: 1; min-width: 200px; border: 1px solid var(--box); border-radius: 3px; padding: 0.5rem 0.8rem; font-family: Montserrat; font-size: 0.85rem; }
.api-save-btn { padding: 0.5rem 1.2rem; background: var(--mauve); color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }
.api-save-btn:hover { background: var(--mid); }
.api-status { font-size: 0.75rem; color: var(--mauve); font-style: italic; }
.container { display: flex; min-height: calc(100vh - 140px); }
.sidebar { width: 300px; background: white; border-right: 1px solid var(--box); padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }
.section-label { font-size: 0.65rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.15em; color: var(--mauve); display: block; margin-bottom: 0.5rem; }
.toggle { display: flex; border: 1px solid var(--box); border-radius: 3px; }
.toggle button { flex: 1; padding: 0.6rem 0.8rem; background: white; border: none; cursor: pointer; font-size: 0.75rem; color: var(--mid); }
.toggle button.active { background: var(--mauve); color: white; }
.panel { display: none; }
.panel.show { display: block; }
.theme-btn { display: block; width: 100%; padding: 0.65rem 0.8rem; border: 1px solid var(--box); border-radius: 3px; background: white; cursor: pointer; text-align: left; margin-bottom: 0.4rem; }
.theme-btn:hover { border-color: var(--mauve); }
.theme-btn.active { background: var(--mauve); color: white; }
.theme-title { font-size: 0.8rem; font-weight: 500; display: block; }
.theme-track { font-size: 0.65rem; color: var(--mauve); display: block; margin-top: 2px; font-style: italic; }
.theme-btn.active .theme-track { color: rgba(255,255,255,0.8); }
textarea { width: 100%; min-height: 100px; border: 1px solid var(--box); border-radius: 3px; padding: 0.8rem; font-family: Montserrat; font-size: 0.9rem; resize: vertical; }
textarea:focus { outline: none; border-color: var(--mauve); }
.type-check { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem; border: 1px solid var(--box); border-radius: 3px; margin-bottom: 0.3rem; cursor: pointer; }
.type-check input { cursor: pointer; accent-color: var(--mauve); }
.type-check span { font-size: 0.75rem; cursor: pointer; }
.type-check.selected { background: #faf7f5; border-color: var(--mauve); }
.gen-btn { width: 100%; padding: 1rem; background: var(--dark); color: white; border: none; border-radius: 3px; cursor: pointer; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; margin-top: auto; }
.gen-btn:hover { background: var(--mauve); }
.gen-btn:disabled { background: var(--box); cursor: not-allowed; }
.output { flex: 1; padding: 2rem; overflow-y: auto; }
.empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.8rem; text-align: center; }
.empty-icon { font-size: 2.2rem; opacity: 0.25; }
.empty-text { font-style: italic; color: var(--mid); opacity: 0.6; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--box); border-top-color: var(--mauve); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { display: flex; gap: 0.8rem; align-items: center; padding: 2rem; }
.out-header { border-bottom: 1px solid var(--box); padding-bottom: 1rem; margin-bottom: 1.5rem; }
.out-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; }
.out-track { font-size: 0.85rem; color: var(--mauve); font-style: italic; margin-top: 0.3rem; }
.content-block { background: white; border: 1px solid var(--box); border-radius: 3px; margin-bottom: 1rem; overflow: hidden; }
.block-header { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 1rem; background: #f9f7f5; border-bottom: 1px solid var(--box); }
.block-label { font-size: 0.65rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--mid); }
.copy-btn { padding: 0.25rem 0.7rem; border: 1px solid var(--box); background: none; cursor: pointer; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--mauve); border-radius: 2px; }
.copy-btn:hover { background: var(--mauve); color: white; border-color: var(--mauve); }
.copy-btn.copied { background: var(--mid); color: white; border-color: var(--mid); }
.block-body { padding: 1.2rem; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; line-height: 1.8; white-space: pre-wrap; }
@media (max-width: 700px) {
  .container { flex-direction: column; }
  .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--box); }
}
</style>
</head>
<body>

<header>
  <div class="logo">Paris <em>Simone</em></div>
  <div class="tagline">Content Studio — SISS™ Framework</div>
</header>

<div class="api-bar">
  <span class="api-label">API Key</span>
  <input type="password" id="keyInput" class="api-input" placeholder="sk-ant-...">
  <button class="api-save-btn" onclick="saveKey()">Save</button>
  <span class="api-status" id="status"></span>
</div>

<div class="container">
  <div class="sidebar">
    
    <div>
      <span class="section-label">Mode</span>
      <div class="toggle">
        <button class="active" onclick="switchMode('theme')">Pick Theme</button>
        <button onclick="switchMode('topic')">Describe Topic</button>
      </div>
    </div>

    <div class="panel show" id="themePanel">
      <span class="section-label">Hook Theme</span>
      <button class="theme-btn active" data-theme="pattern">
        <span class="theme-title">The Pattern Interrupt</span>
        <span class="theme-track">Overloaded</span>
      </button>
      <button class="theme-btn" data-theme="identity">
        <span class="theme-title">The Identity Mirror</span>
        <span class="theme-track">Running on Fumes</span>
      </button>
      <button class="theme-btn" data-theme="truth">
        <span class="theme-title">The Counterintuitive Truth</span>
        <span class="theme-track">Lacking Foundation</span>
      </button>
      <button class="theme-btn" data-theme="method">
        <span class="theme-title">The Method Tease</span>
        <span class="theme-track">Ready to Build</span>
      </button>
      <button class="theme-btn" data-theme="stakes">
        <span class="theme-title">The Stakes</span>
        <span class="theme-track">All Tracks</span>
      </button>
    </div>

    <div class="panel" id="topicPanel">
      <span class="section-label">Your Topic</span>
      <textarea id="topicText" placeholder="Describe what you want to write about..."></textarea>
    </div>

    <div>
      <span class="section-label">Generate</span>
      <label class="type-check selected">
        <input type="radio" name="type" value="all" checked onchange="selectType(this.parentElement)">
        <span>Caption + Hook + Carousel + Visual</span>
      </label>
      <label class="type-check">
        <input type="radio" name="type" value="caption" onchange="selectType(this.parentElement)">
        <span>Caption & Hook only</span>
      </label>
      <label class="type-check">
        <input type="radio" name="type" value="carousel" onchange="selectType(this.parentElement)">
        <span>Carousel script only</span>
      </label>
      <label class="type-check">
        <input type="radio" name="type" value="visual" onchange="selectType(this.parentElement)">
        <span>Visual preview only</span>
      </label>
      <label class="type-check">
        <input type="radio" name="type" value="reel" onchange="selectType(this.parentElement)">
        <span>Reel / TikTok Script</span>
      </label>
      <label class="type-check">
        <input type="radio" name="type" value="youtube" onchange="selectType(this.parentElement)">
        <span>YouTube Script</span>
      </label>
      <label class="type-check">
        <input type="radio" name="type" value="voiceover" onchange="selectType(this.parentElement)">
        <span>Voiceover Script</span>
      </label>
    </div>

    <button class="gen-btn" id="genBtn" onclick="generate()">Generate →</button>
  </div>

  <div class="output" id="output">
    <div class="empty-state">
      <div class="empty-icon">✦</div>
      <div class="empty-text">Select a theme or topic,<br>then hit Generate.</div>
    </div>
  </div>
</div>

<script>
let mode = 'theme';
let theme = 'pattern';

const themes = {
  pattern: { name: 'The Pattern Interrupt', track: 'Overloaded' },
  identity: { name: 'The Identity Mirror', track: 'Running on Fumes' },
  truth: { name: 'The Counterintuitive Truth', track: 'Lacking Foundation' },
  method: { name: 'The Method Tease', track: 'Ready to Build' },
  stakes: { name: 'The Stakes', track: 'All Tracks' }
};

function saveKey() {
  var key = document.getElementById('keyInput').value;
  if (!key.startsWith('sk-ant-')) {
    document.getElementById('status').textContent = '⚠ Must start with sk-ant-';
    return;
  }
  localStorage.setItem('ps_key', key);
  document.getElementById('keyInput').value = '••••' + key.slice(-4);
  document.getElementById('status').textContent = '✓ Saved';
  setTimeout(() => { document.getElementById('status').textContent = ''; }, 2500);
}

function getKey() {
  return localStorage.getItem('ps_key') || '';
}

window.addEventListener('load', () => {
  var k = localStorage.getItem('ps_key');
  if (k) {
    document.getElementById('keyInput').value = '••••' + k.slice(-4);
    document.getElementById('status').textContent = '✓ Ready';
    setTimeout(() => { document.getElementById('status').textContent = ''; }, 1500);
  }
});

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.toggle button').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && m === 'theme') || (i === 1 && m === 'topic'));
  });
  document.getElementById('themePanel').classList.toggle('show', m === 'theme');
  document.getElementById('topicPanel').classList.toggle('show', m === 'topic');
}

document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    theme = this.getAttribute('data-theme');
  });
});

function selectType(el) {
  document.querySelectorAll('.type-check').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

async function generate() {
  var key = getKey();
  var type = document.querySelector('input[name="type"]:checked').value;
  var output = document.getElementById('output');
  var btn = document.getElementById('genBtn');

  if (!key) {
    output.innerHTML = '<div class="empty-state"><div class="empty-text">Please enter your API key first.</div></div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Writing...';
  output.innerHTML = '<div class="loading"><div class="spinner"></div>Writing in your voice...</div>';

  var prompt = '';
  var info = '';

  if (mode === 'theme') {
    var t = themes[theme];
    info = t.name + ' — ' + t.track;
    prompt = `Write content for Paris Simone using the "${t.name}" hook theme for quiz track "${t.track}". ${getInst(type)}`;
  } else {
    var topic = document.getElementById('topicText').value.trim();
    if (!topic) {
      output.innerHTML = '<div class="empty-state"><div class="empty-text">Describe your topic first.</div></div>';
      btn.disabled = false;
      btn.textContent = 'Generate →';
      return;
    }
    info = 'Custom topic';
    prompt = `Write content for Paris Simone about: "${topic}". Pick the best SISS hook theme and track. ${getInst(type)}`;
  }

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1200,
        system: `You are Paris Simone\'s content engine. Paris is a certified trainer, coach, and CEO of P2 Fitness. She created the Stress-Integrated Strength System™ (S.I.S.S.) — a capacity-based strength and behavior-change system designed to help women rebuild consistency, strength, and self-trust without forcing their body through stress it cannot handle.

═══════════════════════════════════════════════════════════════

CORE DEFINITION OF S.I.S.S.:
S.I.S.S. is NOT just workouts. It includes:
- Strength training (mechanical stimulus + progressive overload)
- Nervous system awareness
- Total stress/load management
- Structured eating without extremes
- Capacity-based adjustment
- Identity-based mindset work
- Consistency through safety and repetition

═══════════════════════════════════════════════════════════════

THE CORE BELIEF (emotional backbone):
Most women are NOT inconsistent because they lack discipline.
They are inconsistent because the plan does not account for their capacity, stress load, nervous system state, or real life.

Your brand challenges the industry narrative:
❌ NOT: "You just need to push harder."
✅ BUT: "You need a system that teaches your body how to safely repeat the behavior."

═══════════════════════════════════════════════════════════════

FOUR MAIN PILLARS:
1. Mechanical stimulus + progression: Real strength training, progressive overload, repetition, structure. NOT soft fitness.
2. Total stress awareness: Training does not happen in isolation. Emotional stress, workload, sleep, food, motherhood, business all affect output.
3. Capacity-based regulation: Green/Yellow/Red days adjust intensity based on current capacity.
4. Identity-based mindset work: Goal is to become the woman who can trust herself, show up consistently, stop starting over.

═══════════════════════════════════════════════════════════════

GREEN / YELLOW / RED CAPACITY LANGUAGE:
🟢 GREEN DAY: Higher capacity. More energy, focus, recovery, emotional bandwidth.
   Marketing angle: "This is where we can push, progress, lift heavier, challenge the body."

🟡 YELLOW DAY: Moderate capacity. Present but not fully recovered or energized.
   Marketing angle: "We adjust the output without abandoning the standard."

🔴 RED DAY: Low capacity. High stress, depletion, fatigue, emotional load, dysregulation.
   Marketing angle: "We do not quit. We lower the demand so the nervous system can still build trust through completion."
   ⚠️ CRITICAL RULE: Never treat Red Days as failure days.

═══════════════════════════════════════════════════════════════

YOUR AUDIENCE (who she is):
Overwhelmed, tired of starting over, successful in other areas but inconsistent with her body, carrying emotional/mental/family load, frustrated because traditional plans worked temporarily but never became sustainable, ashamed because she thinks she "should know better," tired of all-or-nothing cycles, craving structure not rigidity, drawn to science and identity-based change.

Speak to her EMOTIONAL TENSION, not just fitness goals.
✅ Good: "You are not lazy. You may be trying to build consistency inside a system that keeps ignoring your stress load."
❌ Bad: "No excuses. Get disciplined."

═══════════════════════════════════════════════════════════════

YOUR VOICE:
Direct. Premium. Intelligent. Disruptive. Compassionate, but not coddling.
Authority + seen-ness.
Poetic but punchy. Never hype. Never preachy.
Confession-first hooks (specific emotional truths, not generic reframes).

Example tone: "The problem is not that you keep falling off. The problem is that the plan keeps requiring a version of you that does not exist every day."

═══════════════════════════════════════════════════════════════

WORDS/PHRASES TO USE OFTEN:
capacity | total stress load | nervous system safety | consistency through repetition | safety before intensity | output vs. input | structure without extremes | stress-integrated strength | stop starting over | rebuild self-trust | minimum standard | capacity-based training | predictable repetition | strength without burnout | your body is not failing you | the plan is ignoring your reality | you do not need another PDF | static information cannot solve dynamic behavior

═══════════════════════════════════════════════════════════════

WORDS/PHRASES TO AVOID:
"no excuses" | "summer body" | "snap back" | "shred" | "detox" | "burn fat fast" | "just stay consistent" | "just be disciplined" | "grind harder" | "beast mode" | "lazy" | "cheat meals" | "good foods/bad foods" | "fix your hormones" | "heal your nervous system" as overpromise
Also: NO medical claims. Say "helps you train in a way that respects stress load" NOT "fixes hormonal imbalance."

═══════════════════════════════════════════════════════════════

YOUR OFFER LADDER:
Reset & Rebuild™ (Entry): 7-day reset. Front door. Stop forcing consistency, rebuild structure through capacity-based training, regulation, identity anchoring.
Rebuild & Rise™ (Guided): 4-week interactive, guided experience. Capacity-based training + structured eating + daily guidance. NOT just a PDF.
1:1 Mentorship (Premium): Deeper personalization, feedback, programming adjustments, accountability.

Rebuild & Rise™ weekly names: Re-Establish | Reinforce | Rise | Strengthen (DO NOT confuse with S.I.S.S. system phases)

═══════════════════════════════════════════════════════════════

S.I.S.S. SYSTEM PHASES (internal methodology):
Regulate | Stabilize | Anchor | Restore & Rebuild | Integrate | Strengthen | Solidify

═══════════════════════════════════════════════════════════════

YOUR FREE TOOLS & SMART CTA ROUTING:
Starting Point / Regulation Quiz CTA: Use when content is about nervous system, burnout, inconsistency, starting over, low capacity, stress, training readiness, all-or-nothing behavior, Green/Yellow/Red days.
Fuel Check CTA: Use when content is about food, under-eating, clean eating not working, cravings, energy crashes, eating structure, fueling workouts, "you can\'t out-train under-fueling," weekend eating collapse, food consistency.
🚨 DO NOT randomly send people to Fuel Check if post is not about food.

═══════════════════════════════════════════════════════════════

MAJOR CONTENT THEMES (what you write about):
1. S.I.S.S. education: Explaining system, pillars, phases, capacity days.
2. Belief disruption: Challenging myths ("You just need discipline," "Keep muscles guessing," "More intensity = better results," "If you fall off you failed," "Clean eating fixes everything").
3. Nervous system + strength: Burnout, stress, safety, repetition, fitness consistency.
4. Food + fuel: Why under-fueling, clean eating, rigid rules backfire.
5. Identity & self-trust: Consistency as relationship with self, not performance.
6. Interactive guidance vs static: Your app/system vs PDFs and generic plans that do not adapt to real human behavior.

═══════════════════════════════════════════════════════════════

STRONGEST BRAND STATEMENTS (use these to anchor hooks):
"Consistency comes from safety, not intensity."
"Your body cannot build trust with a plan that keeps threatening it."
"A depleted body does not need more pressure. It needs a lower barrier to completion."
"Static information cannot solve dynamic human behavior."
"You are not inconsistent. You may be under-supported."
"The goal is not to push through every day. The goal is to build a body and identity that can repeat the standard."
"S.I.S.S. does not remove effort. It teaches effort how to meet capacity."

═══════════════════════════════════════════════════════════════

WHAT YOU DO NOT DO:
❌ Diagnose | Claim to cure burnout, perimenopause, trauma, hormonal issues | Promise weight loss | Overuse nervous system language without tying to strength/behavior | Sound too soft/spiritual when topic is training | Make your system sound like therapy | Flatten your work into "mindset and motivation" | Suggest exercises unless asked | Write generic captions that simply duplicate voiceover

═══════════════════════════════════════════════════════════════

THE "ENEMY" (positioning, not aggression):
Generic fitness advice | Static PDFs pretending to solve dynamic behavior | All-or-nothing programming | Discipline-only messaging | Plans that ignore stress load | Programs that punish low capacity | Under-fueled training | Performative consistency | Shame-based transformation culture

Content should make her feel: "I am not broken. I have been trying to succeed inside a system that never accounted for my life."

═══════════════════════════════════════════════════════════════

CRITICAL: Respond ONLY with raw JSON. Start with { end with }. No markdown. No backticks. No preamble.`,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    var data = await res.json();
    if (data.error) throw new Error(data.error.message);
    if (!data.content) throw new Error('No response');

    var text = data.content.map(c => c.text || '').join('');
    var s = text.indexOf('{');
    var e = text.lastIndexOf('}');
    if (s === -1 || e === -1) throw new Error('Bad JSON: ' + text.slice(0, 100));
    
    var parsed = JSON.parse(text.slice(s, e + 1));
    renderOut(parsed, info);

  } catch (err) {
    output.innerHTML = `<div class="empty-state"><div class="empty-text">Error: ${err.message}</div></div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Generate →';
}

function getInst(t) {
  var base = 'CRITICAL: (1) Hook = specific emotional confession, NOT generic reframe. Make her think "that\'s me." (2) Weave S.I.S.S. naturally: capacity 🟢🟡🔴, total stress load, nervous system safety, consistency through repetition, pillars. (3) Avoid: "no excuses," "detox," "shred," "fix hormones," "heal nervous system," medical claims. (4) CTA routing: Starting Point Quiz for nervous system/burnout/inconsistency/capacity/stress/training readiness. Fuel Check ONLY for food/fueling/under-eating topics. Never randomly send to Fuel Check. (5) Make her feel "I\'m not broken. The system was ignoring my life." ';
  var m = {
    all: base + 'Generate confession hook (1 line), full caption (hook + 3-5 lines weaving S.I.S.S. concepts + smart CTA), carousel (5 slides: slide 1 = confession hook, slides 2-4 = reframe using S.I.S.S. language/capacity days/stress load/identity work, slide 5 = smart CTA), hashtags (8 tags). Return JSON: {hook, caption, carousel:[{slide,title,body}], hashtags, theme, track}',
    caption: base + 'Generate confession hook (1 line) and full caption (3-5 lines weaving S.I.S.S. concepts + smart CTA). Return JSON: {hook, caption, theme, track}',
    carousel: base + 'Generate 5-slide carousel: slide 1 = confession hook, slides 2-4 = reframe with S.I.S.S. pillars/capacity/stress load/identity, slide 5 = smart CTA to correct free tool or program. Return JSON: {carousel:[{slide,title,body}], theme, track}',
    visual: base + 'Generate 3 slide preview texts. Return JSON: {slides:[{heading,subtext}], theme, track}',
    reel: base + 'Generate Reel/TikTok script: hook (0-3s, must be confession), 3-4 timed lines weaving S.I.S.S. language (capacity, safety, nervous system, consistency through repetition), smart CTA. Return JSON: {hook, script:[{timing,line}], cta, duration, theme, track}',
    youtube: base + 'Generate YouTube script: title, confession hook (30s), intro connecting to her identity, 3 points using S.I.S.S. naturally (pillars, capacity days, stress load, regulation), outro + smart CTA. Return JSON: {title, hook, intro, points:[{heading,notes}], outro, cta, theme, track}',
    voiceover: base + 'Generate voiceover for faceless video: confession hook, 4-5 punchy b-roll lines weaving S.I.S.S. (capacity, stress load, nervous system safety, consistency through repetition), closing + smart CTA. Return JSON: {hook, lines:[string], closing, theme, track}'
  };
  return m[t] || m.all;
}

function renderOut(d, i) {
  var h = `<div class="out-header"><div class="out-title">${d.theme || 'Content'}</div><div class="out-track">${d.track || i}</div></div>`;
  
  if (d.hook && !d.script) h += blk('Hook', d.hook);
  if (d.caption) h += blk('Caption', d.caption);
  if (d.carousel) {
    var ct = d.carousel.map((s, i) => `Slide ${s.slide || i+1}: ${s.title}\n${s.body}`).join('\n\n');
    h += blk('Carousel', ct);
  }
  if (d.script) {
    var rt = `HOOK (0-3s): ${d.hook}\n\n${d.script.map(s => `[${s.timing}] ${s.line}`).join('\n')}\n\nCTA: ${d.cta}`;
    if (d.duration) rt += `\nDuration: ${d.duration}`;
    h += blk('Reel Script', rt);
  }
  if (d.points && d.intro) {
    var yt = `TITLE: ${d.title || ''}\n\nHOOK:\n${d.hook}\n\nINTRO:\n${d.intro}\n\n${d.points.map((p, i) => `POINT ${i+1}: ${p.heading}\n${p.notes}`).join('\n\n')}\n\nOUTRO:\n${d.outro}\n\nCTA: ${d.cta}`;
    h += blk('YouTube Script', yt);
  }
  if (d.lines) {
    var vo = `HOOK: ${d.hook}\n\n${d.lines.map((l, i) => `[${i+1}] ${l}`).join('\n')}\n\nCLOSING: ${d.closing}`;
    h += blk('Voiceover Script', vo);
  }
  if (d.hashtags) h += blk('Hashtags', Array.isArray(d.hashtags) ? d.hashtags.join(' ') : d.hashtags);
  
  document.getElementById('output').innerHTML = h;
}

function blk(lbl, txt) {
  var id = 'b' + Math.random().toString(36).slice(2, 6);
  return `<div class="content-block"><div class="block-header"><span class="block-label">${lbl}</span><button class="copy-btn" onclick="cp('${id}', this)">Copy</button></div><div class="block-body" id="${id}">${txt}</div></div>`;
}

function cp(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => {
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  });
}
</script>
