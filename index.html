<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paris Simone — Content Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f1ee;
    --mauve: #9e6b65;
    --box: #ddcfc7;
    --dark: #1e1410;
    --mid: #5c3c38;
    --white: #ffffff;
    --light: #ede6e1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--dark);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 2.5rem 3rem 1.5rem;
    border-bottom: 1px solid var(--box);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 1.6rem;
    color: var(--dark);
    letter-spacing: -0.01em;
  }

  .logo span {
    font-style: italic;
    color: var(--mauve);
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--mid);
    letter-spacing: 0.02em;
  }

  /* MAIN LAYOUT */
  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: calc(100vh - 90px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--box);
    padding: 2rem;
    background: var(--white);
    display: flex;
    flex-direction: column;
    gap: 1.8rem;
  }

  .section-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mauve);
    margin-bottom: 0.6rem;
  }

  /* MODE TOGGLE */
  .mode-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 1px solid var(--box);
    border-radius: 4px;
    overflow: hidden;
  }

  .mode-btn {
    padding: 0.7rem 0.5rem;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--mid);
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .mode-btn.active {
    background: var(--mauve);
    color: var(--white);
  }

  /* THEME PILLS */
  .theme-grid {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .theme-pill {
    padding: 0.65rem 1rem;
    border: 1px solid var(--box);
    border-radius: 3px;
    background: none;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-family: 'Montserrat', sans-serif;
  }

  .theme-pill:hover {
    border-color: var(--mauve);
    background: #faf7f5;
  }

  .theme-pill.active {
    border-color: var(--mauve);
    background: var(--mauve);
  }

  .theme-pill.active .pill-title { color: var(--white); }
  .theme-pill.active .pill-track { color: rgba(255,255,255,0.7); }

  .pill-title {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--dark);
    display: block;
  }

  .pill-track {
    font-size: 0.65rem;
    color: var(--mauve);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    display: block;
    margin-top: 1px;
  }

  /* TOPIC INPUT */
  .topic-section { display: none; }
  .topic-section.visible { display: block; }

  textarea {
    width: 100%;
    min-height: 100px;
    border: 1px solid var(--box);
    border-radius: 3px;
    padding: 0.8rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--dark);
    background: #faf7f5;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  textarea:focus { border-color: var(--mauve); }
  textarea::placeholder { color: var(--box); font-style: italic; }

  /* OUTPUT TYPE */
  .output-type {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .type-option {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    padding: 0.5rem 0.7rem;
    border: 1px solid var(--box);
    border-radius: 3px;
    transition: all 0.2s;
  }

  .type-option:hover { border-color: var(--mauve); }
  .type-option.selected { border-color: var(--mauve); background: #faf7f5; }

  .type-option input { accent-color: var(--mauve); }

  .type-label {
    font-size: 0.75rem;
    color: var(--dark);
    letter-spacing: 0.03em;
  }

  /* GENERATE BTN */
  .generate-btn {
    width: 100%;
    padding: 1rem;
    background: var(--dark);
    color: var(--white);
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    letter-spacing: 0.03em;
    transition: all 0.25s;
    margin-top: auto;
  }

  .generate-btn:hover { background: var(--mauve); }
  .generate-btn:disabled { background: var(--box); cursor: not-allowed; }

  /* OUTPUT PANEL */
  .output-panel {
    padding: 2.5rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--box);
  }

  .output-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--dark);
  }

  .output-track {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--mauve);
  }

  /* CONTENT BLOCKS */
  .content-blocks {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .content-block {
    background: var(--white);
    border: 1px solid var(--box);
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .content-block:nth-child(1) { animation-delay: 0.05s; }
  .content-block:nth-child(2) { animation-delay: 0.15s; }
  .content-block:nth-child(3) { animation-delay: 0.25s; }
  .content-block:nth-child(4) { animation-delay: 0.35s; }

  .block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.7rem 1rem;
    background: var(--light);
    border-bottom: 1px solid var(--box);
  }

  .block-type {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mid);
  }

  .copy-btn {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mauve);
    background: none;
    border: 1px solid var(--box);
    border-radius: 2px;
    padding: 0.2rem 0.6rem;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    transition: all 0.15s;
  }

  .copy-btn:hover { background: var(--mauve); color: var(--white); border-color: var(--mauve); }
  .copy-btn.copied { background: var(--mid); color: var(--white); border-color: var(--mid); }

  .block-content {
    padding: 1.2rem 1.2rem 1.4rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--dark);
    white-space: pre-wrap;
  }

  /* VISUAL PREVIEW */
  .visual-preview {
    background: var(--white);
    border: 1px solid var(--box);
    border-radius: 4px;
    overflow: hidden;
  }

  .visual-header {
    padding: 0.7rem 1rem;
    background: var(--light);
    border-bottom: 1px solid var(--box);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .carousel-frame {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--box);
  }

  .slide {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background: var(--bg);
    position: relative;
    text-align: center;
  }

  .slide-num {
    position: absolute;
    top: 0.5rem;
    left: 0.5rem;
    font-size: 0.5rem;
    color: var(--box);
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.1em;
  }

  .slide-content {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.65rem;
    color: var(--dark);
    line-height: 1.4;
  }

  .slide-accent {
    width: 20px;
    height: 1px;
    background: var(--mauve);
    margin: 0.4rem auto;
  }

  .slide-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.45rem;
    color: var(--mauve);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* EMPTY STATE */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    color: var(--box);
    text-align: center;
    padding: 4rem;
  }

  .empty-icon {
    font-size: 2.5rem;
    opacity: 0.4;
  }

  .empty-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--mid);
    opacity: 0.5;
  }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--mid);
    font-size: 1rem;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--box);
    border-top-color: var(--mauve);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--box);
    margin: 0.2rem 0;
  }

  /* API KEY BAR */
  .api-bar {
    background: var(--white);
    border-bottom: 1px solid var(--box);
    padding: 0.55rem 3rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .api-label {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mauve);
    white-space: nowrap;
  }

  .api-input {
    flex: 1;
    border: 1px solid var(--box);
    border-radius: 3px;
    padding: 0.35rem 0.7rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    color: var(--dark);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.04em;
  }

  .api-input:focus { border-color: var(--mauve); }
  .api-input::placeholder { color: var(--box); font-style: italic; }

  .api-save {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--white);
    background: var(--mauve);
    border: none;
    border-radius: 3px;
    padding: 0.35rem 0.8rem;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    white-space: nowrap;
    transition: background 0.2s;
  }

  .api-save:hover { background: var(--mid); }

  .api-status {
    font-size: 0.65rem;
    color: var(--mauve);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    white-space: nowrap;
  }

  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--box); }
    header { flex-direction: column; align-items: flex-start; gap: 0.3rem; padding: 1.5rem; }
    .output-panel { padding: 1.5rem; }
    .api-bar { padding: 0.55rem 1.5rem; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Paris <span>Simone</span></div>
  <div class="tagline">Content Studio — SISS™ Framework</div>
</header>

<!-- API KEY BAR -->
<div class="api-bar">
  <span class="api-label">API Key</span>
  <input class="api-input" id="api-key-input" type="password" placeholder="Paste your Anthropic API key here (sk-ant-...)">
  <button class="api-save" onclick="saveApiKey()">Save</button>
  <span class="api-status" id="api-status"></span>
</div>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">

    <div>
      <div class="section-label">Mode</div>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('theme')">Pick a Theme</button>
        <button class="mode-btn" onclick="setMode('topic')">Describe Topic</button>
      </div>
    </div>

    <!-- THEME MODE -->
    <div id="theme-section">
      <div class="section-label">Hook Theme</div>
      <div class="theme-grid">
        <button class="theme-pill active" onclick="selectTheme(this, 'pattern')" data-theme="pattern">
          <span class="pill-title">The Pattern Interrupt</span>
          <span class="pill-track">Track: Overloaded</span>
        </button>
        <button class="theme-pill" onclick="selectTheme(this, 'identity')" data-theme="identity">
          <span class="pill-title">The Identity Mirror</span>
          <span class="pill-track">Track: Running on Fumes</span>
        </button>
        <button class="theme-pill" onclick="selectTheme(this, 'truth')" data-theme="truth">
          <span class="pill-title">The Counterintuitive Truth</span>
          <span class="pill-track">Track: Lacking Foundation</span>
        </button>
        <button class="theme-pill" onclick="selectTheme(this, 'method')" data-theme="method">
          <span class="pill-title">The Method Tease</span>
          <span class="pill-track">Track: Ready to Build</span>
        </button>
        <button class="theme-pill" onclick="selectTheme(this, 'stakes')" data-theme="stakes">
          <span class="pill-title">The Stakes</span>
          <span class="pill-track">Track: All</span>
        </button>
      </div>
    </div>

    <!-- TOPIC MODE -->
    <div id="topic-section" class="topic-section">
      <div class="section-label">Your Topic</div>
      <textarea id="topic-input" placeholder="e.g. Why stressed women need to train differently than men..."></textarea>
    </div>

    <div class="divider"></div>

    <!-- OUTPUT TYPE -->
    <div>
      <div class="section-label">Generate</div>
      <div class="output-type">
        <label class="type-option selected">
          <input type="radio" name="output" value="all" checked onchange="selectType(this.parentElement)"> 
          <span class="type-label">Caption + Hook + Carousel + Visual</span>
        </label>
        <label class="type-option">
          <input type="radio" name="output" value="caption" onchange="selectType(this.parentElement)">
          <span class="type-label">Caption & Hook only</span>
        </label>
        <label class="type-option">
          <input type="radio" name="output" value="carousel" onchange="selectType(this.parentElement)">
          <span class="type-label">Carousel script only</span>
        </label>
        <label class="type-option">
          <input type="radio" name="output" value="visual" onchange="selectType(this.parentElement)">
          <span class="type-label">Visual preview only</span>
        </label>
        <label class="type-option">
          <input type="radio" name="output" value="reel" onchange="selectType(this.parentElement)">
          <span class="type-label">Reel / TikTok Script</span>
        </label>
        <label class="type-option">
          <input type="radio" name="output" value="youtube" onchange="selectType(this.parentElement)">
          <span class="type-label">YouTube Script</span>
        </label>
        <label class="type-option">
          <input type="radio" name="output" value="voiceover" onchange="selectType(this.parentElement)">
          <span class="type-label">Voiceover Script</span>
        </label>
      </div>
    </div>

    <button class="generate-btn" onclick="generate()" id="gen-btn">Generate Content →</button>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="output-panel" id="output-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <div class="empty-text">Select a theme or describe your topic,<br>then generate your content.</div>
    </div>
  </div>
</div>

<script>
// API KEY MANAGEMENT
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-ant-')) {
    document.getElementById('api-status').textContent = '⚠ Should start with sk-ant-';
    return;
  }
  localStorage.setItem('ps_api_key', val);
  document.getElementById('api-key-input').value = '••••••••••••' + val.slice(-4);
  document.getElementById('api-status').textContent = '✓ Saved';
  setTimeout(() => { document.getElementById('api-status').textContent = ''; }, 3000);
}

function getApiKey() {
  return localStorage.getItem('ps_api_key') || '';
}

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('ps_api_key');
  if (saved) {
    document.getElementById('api-key-input').value = '••••••••••••' + saved.slice(-4);
    document.getElementById('api-status').textContent = '✓ Key ready';
    setTimeout(() => { document.getElementById('api-status').textContent = ''; }, 2000);
  }
});

let currentMode = 'theme';
let currentTheme = 'pattern';

const themeData = {
  pattern: { name: 'The Pattern Interrupt', track: 'Overloaded' },
  identity: { name: 'The Identity Mirror', track: 'Running on Fumes' },
  truth: { name: 'The Counterintuitive Truth', track: 'Lacking Foundation' },
  method: { name: 'The Method Tease', track: 'Ready to Build' },
  stakes: { name: 'The Stakes', track: 'All Tracks' },
};

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('theme-section').style.display = mode === 'theme' ? 'block' : 'none';
  const ts = document.getElementById('topic-section');
  ts.classList.toggle('visible', mode === 'topic');
}

function selectTheme(el, theme) {
  currentTheme = theme;
  document.querySelectorAll('.theme-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}

function selectType(el) {
  document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function getSelectedOutput() {
  return document.querySelector('input[name="output"]:checked').value;
}

async function generate() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  const outputType = getSelectedOutput();
  const panel = document.getElementById('output-panel');

  panel.innerHTML = `<div class="loading"><div class="spinner"></div>Writing in your voice...</div>`;

  let prompt = '';
  let themeInfo = '';

  if (currentMode === 'theme') {
    const t = themeData[currentTheme];
    themeInfo = `Theme: "${t.name}" | Quiz Track: ${t.track}`;
    prompt = buildThemePrompt(currentTheme, outputType, t);
  } else {
    const topic = document.getElementById('topic-input').value.trim();
    if (!topic) {
      panel.innerHTML = `<div class="empty-state"><div class="empty-text">Please describe your topic first.</div></div>`;
      btn.disabled = false;
      btn.textContent = 'Generate Content →';
      return;
    }
    themeInfo = `Custom topic: "${topic}"`;
    prompt = buildTopicPrompt(topic, outputType);
  }

  const apiKey = getApiKey();
  if (!apiKey) {
    panel.innerHTML = `<div class="empty-state"><div class="empty-text">Please enter and save your Anthropic API key above first.</div></div>`;
    btn.disabled = false;
    btn.textContent = 'Generate Content →';
    return;
  }

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { 
        "Content-Type": "application/json", 
        "x-api-key": apiKey, 
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 1000,
        system: `You are a content writer for Paris Simone (@Passports2Paris), a certified personal trainer and creator of the Stress Integrated Strength System™ (SISS). Her brand voice is: warm but direct, editorial, never hype-y, speaks to high-achieving women who are burned out. Her two anchor lines are: "I turn burnout into a training advantage." and "Because the women I train can't afford to burn out." Her brand is nervous system-based strength training. Always write in her voice — confident, specific, a little poetic, never generic fitness content. CRITICAL: You must respond with ONLY a raw JSON object. No markdown. No backticks. No explanation. No preamble. Start your response with { and end with }. Nothing else.`,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    console.log('API response:', JSON.stringify(data));
    
    // Handle API errors
    if (data.error) throw new Error(data.error.message || 'API error');
    if (!data.content || !Array.isArray(data.content)) throw new Error('Unexpected response: ' + JSON.stringify(data));
    
    const text = data.content.map(i => i.text || '').join('');
    console.log('Raw text:', text);
    
    // Robust JSON extraction
    const start = text.indexOf('{');
    const end = text.lastIndexOf('}');
    if (start === -1 || end === -1) throw new Error('No JSON in response: ' + text.slice(0, 200));
    const clean = text.slice(start, end + 1);
    const parsed = JSON.parse(clean);

    renderOutput(parsed, themeInfo, outputType);

  } catch (err) {
    console.error('Full error:', err);
    panel.innerHTML = `<div class="empty-state"><div class="empty-text">Error: ${err.message}<br><br>Check your API key and try again.</div></div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Generate Content →';
}

function buildThemePrompt(theme, outputType, themeObj) {
  const instructions = {
    all: 'Generate: hook (1 punchy line), caption (3-5 lines with hook embedded), carousel (5 slides with title + 1-2 lines each), hashtags (8-10 relevant tags). Return JSON: { hook, caption, carousel: [{slide, title, body}], hashtags, theme, track }',
    caption: 'Generate: hook (1 punchy line), caption (3-5 lines). Return JSON: { hook, caption, theme, track }',
    carousel: 'Generate a 5-slide carousel. Return JSON: { carousel: [{slide, title, body}], theme, track }',
    visual: 'Generate 3 slide preview texts. Return JSON: { slides: [{heading, subtext}], theme, track }',
    reel: 'Generate a Reel/TikTok script with: hook (first 3 seconds), 3-4 talking points with timing cues in seconds, and a CTA. Return JSON: { hook, script: [{timing, line}], cta, duration, theme, track }',
    youtube: 'Generate a YouTube script with: title, hook (first 30 seconds), intro, 3 main points each with talking notes, outro, and CTA. Return JSON: { title, hook, intro, points: [{heading, notes}], outro, cta, theme, track }',
    voiceover: 'Generate a voiceover script for a faceless video: hook line, 4-5 short punchy lines to read over b-roll, and a closing line. Return JSON: { hook, lines: [string], closing, theme, track }'
  };

  return `Write content for Paris Simone using the "${themeObj.name}" hook theme for the quiz track "${themeObj.track}". ${instructions[outputType]}`;
}

function buildTopicPrompt(topic, outputType) {
  const instructions = {
    all: 'Generate: hook (1 punchy line), caption (3-5 lines), carousel (5 slides with title + 1-2 lines each), hashtags (8-10 tags). Return JSON: { hook, caption, carousel: [{slide, title, body}], hashtags, theme, track }',
    caption: 'Generate: hook (1 punchy line), caption (3-5 lines). Return JSON: { hook, caption, theme, track }',
    carousel: 'Generate a 5-slide carousel. Return JSON: { carousel: [{slide, title, body}], theme, track }',
    visual: 'Generate 3 slide preview texts. Return JSON: { slides: [{heading, subtext}], theme, track }',
    reel: 'Generate a Reel/TikTok script with: hook (first 3 seconds), 3-4 talking points with timing cues in seconds, and a CTA. Return JSON: { hook, script: [{timing, line}], cta, duration, theme, track }',
    youtube: 'Generate a YouTube script with: title, hook (first 30 seconds), intro, 3 main points each with talking notes, outro, and CTA. Return JSON: { title, hook, intro, points: [{heading, notes}], outro, cta, theme, track }',
    voiceover: 'Generate a voiceover script for a faceless video: hook line, 4-5 short punchy lines to read over b-roll, and a closing line. Return JSON: { hook, lines: [string], closing, theme, track }'
  };

  return `Write content for Paris Simone about this topic: "${topic}". Identify the most fitting SISS hook theme and quiz track. ${instructions[outputType]}`;
}

function renderOutput(data, themeInfo, outputType) {
  const panel = document.getElementById('output-panel');
  let html = `
    <div class="output-header">
      <div>
        <div class="output-title">${data.theme || 'Generated Content'}</div>
        <div class="output-track">${data.track || themeInfo}</div>
      </div>
    </div>
    <div class="content-blocks">
  `;

  if (data.hook) {
    html += makeBlock('Hook — Stop the Scroll', data.hook);
  }

  if (data.caption) {
    html += makeBlock('Caption', data.caption);
  }

  if (data.carousel) {
    let carouselText = data.carousel.map((s, i) =>
      `Slide ${s.slide || i+1}: ${s.title}\n${s.body}`
    ).join('\n\n');
    html += makeBlock('Carousel Script', carouselText);

    // Visual preview
    html += `
      <div class="visual-preview">
        <div class="visual-header">
          <span class="block-type">Visual Preview</span>
        </div>
        <div class="carousel-frame">
    `;
    data.carousel.slice(0, 3).forEach((s, i) => {
      html += `
        <div class="slide">
          <span class="slide-num">0${i+1}</span>
          <div class="slide-content">${s.title}</div>
          <div class="slide-accent"></div>
          <div class="slide-sub">SISS™</div>
        </div>
      `;
    });
    html += `</div></div>`;
  }

  if (data.slides && !data.carousel) {
    html += `
      <div class="visual-preview">
        <div class="visual-header">
          <span class="block-type">Visual Preview</span>
        </div>
        <div class="carousel-frame">
    `;
    data.slides.forEach((s, i) => {
      html += `
        <div class="slide">
          <span class="slide-num">0${i+1}</span>
          <div class="slide-content">${s.heading}</div>
          <div class="slide-accent"></div>
          <div class="slide-sub">${s.subtext || 'SISS™'}</div>
        </div>
      `;
    });
    html += `</div></div>`;
  }

  if (data.hashtags) {
    const tags = Array.isArray(data.hashtags) ? data.hashtags.join(' ') : data.hashtags;
    html += makeBlock('Hashtags', tags);
  }

  // REEL SCRIPT
  if (data.script) {
    let reelText = `HOOK (0-3s): ${data.hook}

`;
    reelText += data.script.map(s => `[${s.timing}] ${s.line}`).join('
');
    reelText += `

CTA: ${data.cta}`;
    if (data.duration) reelText += `
Estimated duration: ${data.duration}`;
    html += makeBlock('Reel / TikTok Script', reelText);
  }

  // YOUTUBE SCRIPT
  if (data.points && data.intro) {
    let ytText = `TITLE: ${data.title || ''}

HOOK:
${data.hook}

INTRO:
${data.intro}

`;
    ytText += data.points.map((p, i) => `POINT ${i+1}: ${p.heading}
${p.notes}`).join('

');
    ytText += `

OUTRO:
${data.outro}

CTA: ${data.cta}`;
    html += makeBlock('YouTube Script', ytText);
  }

  // VOICEOVER SCRIPT
  if (data.lines) {
    let voText = `HOOK: ${data.hook}

`;
    voText += data.lines.map((l, i) => `[${i+1}] ${l}`).join('
');
    voText += `

CLOSING: ${data.closing}`;
    html += makeBlock('Voiceover Script', voText);
  }

  html += `</div>`;
  panel.innerHTML = html;
}

function makeBlock(type, content) {
  const id = 'block-' + Math.random().toString(36).substr(2, 6);
  return `
    <div class="content-block">
      <div class="block-header">
        <span class="block-type">${type}</span>
        <button class="copy-btn" onclick="copyBlock('${id}', this)">Copy</button>
      </div>
      <div class="block-content" id="${id}">${content}</div>
    </div>
  `;
}

function copyBlock(id, btn) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
